<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChatLink - Login</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Helvetica, Arial, sans-serif;
            background: #0a0e17;
            color: #e9edef;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .login-container {
            background: #111b21;
            border-radius: 12px;
            padding: 48px 40px;
            width: 400px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
            border: 1px solid #2a3942;
        }
        .logo {
            text-align: center;
            margin-bottom: 32px;
        }
        .logo img {
            width: 60px;
            height: 60px;
            border-radius: 16px;
        }
        .logo h1 {
            font-size: 24px;
            margin-top: 12px;
            color: #00a884;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            font-size: 13px;
            color: #8696a0;
            margin-bottom: 8px;
        }
        .form-group input {
            width: 100%;
            padding: 14px 16px;
            background: #0b141a;
            border: 1px solid #2a3942;
            border-radius: 8px;
            color: #e9edef;
            font-size: 15px;
            outline: none;
            transition: border-color 0.2s;
        }
        .form-group input:focus {
            border-color: #00a884;
        }
        .login-btn {
            width: 100%;
            padding: 14px;
            background: #00a884;
            border: none;
            border-radius: 8px;
            color: #fff;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 8px;
        }
        .login-btn:hover {
            background: #00c49a;
        }
        .error {
            background: #3b1a1a;
            border: 1px solid #cc3333;
            border-radius: 8px;
            padding: 12px 16px;
            margin-bottom: 20px;
            color: #ff6666;
            font-size: 14px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">
            <img src="logo.png" alt="ChatLink">
            <h1>ChatLink CRM</h1>
        </div>
        <div class="error" id="error">Invalid username or password</div>
        <form onsubmit="login(event)">
            <div class="form-group">
                <label>Username</label>
                <input type="text" id="username" required autocomplete="username">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" required autocomplete="current-password">
            </div>
            <button type="submit" class="login-btn">Login</button>
        </form>
    </div>
    <script>
        async function login(e) {
            e.preventDefault();
            // Generate machine ID (same logic as script.js)
            let machineId = localStorage.getItem('machine_id');
            if (!machineId) {
                const fp = [navigator.userAgent, screen.width+'x'+screen.height, screen.colorDepth, Intl.DateTimeFormat().resolvedOptions().timeZone, navigator.language, navigator.hardwareConcurrency].join('|');
                let hash = 0;
                for (let i = 0; i < fp.length; i++) { const chr = fp.charCodeAt(i); hash = ((hash << 5) - hash) + chr; hash |= 0; }
                machineId = 'machine_' + Math.abs(hash).toString(36) + '_' + Date.now().toString(36);
                localStorage.setItem('machine_id', machineId);
            }
            const res = await fetch('/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    username: document.getElementById('username').value,
                    password: document.getElementById('password').value,
                    machineId: machineId
                })
            });
            const data = await res.json();
            if (data.success) {
                window.location.href = '/';
            } else {
                document.getElementById('error').style.display = 'block';
            }
        }
        }
    </script>
</body>
</html>
